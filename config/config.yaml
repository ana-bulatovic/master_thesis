model:
  name: llama3.1:latest
  num_predict: 128
  temperature: 0.4
pipeline:
  prompting_technique: few-shot
  sarcasm_model: llama3.1:latest
  sentiment_model: llama3.1:latest
  summarization_model: llama3.1:latest
  use_sarcasm_detection: true
  use_sentiment_for_summarization: true
  use_sarcasm_for_summarization: true
  use_sarcasm_for_sentiment: true
  sarcasm_backend: fine-tuned
  sarcasm_finetuned_path: models/sarcasm_bertweet/final
  data_dir: data/processed
  output_dir: results
